<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Introduction to objects in JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Introduction to objects in JS</h1>
    <p id="output"></p>
    <p id="output2"></p>
    <script>
        let programmer1 = {
            name: "Justin",
            age: 23,
            city: "Delhi",
            experience_in_years: 4,
            programming_language: "JavaScript",
            salary: 400000,
            company: "Google",
            skill: "Web Development"
        }
        document.getElementById("output").innerText = "Hi, my name is " + programmer1.name + ". I am " + programmer1.age + " years old" + ". I live in " + programmer1.city + ". I have " + programmer1.experience_in_years + " years of experience" + ". My programming language is " + programmer1.programming_language + ". My salary is " + programmer1.salary + ". I work in " + programmer1.company + ". My skill is " + programmer1.skill + "."

        let programmer2 = {
                name: "Patrick",
                age: 34,
                city: "Chicago",
                experience_in_years: 13,
                programming_language: "Python",
                salary: 600000,
                company: "Microsoft",
                skill: "Data Science"
            }
            document.getElementById("output2").innerText = "Hi, my name is " + programmer2.name + ". I am " + programmer2.age + " years old" + ". I live in " + programmer2.city + ". I have " + programmer2.experience_in_years + " years of experience" + ". My programming language is " + programmer2.programming_language + ". My salary is " + programmer2.salary + ". I work in " + programmer2.company + ". My skill is " + programmer2.skill + "."
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
