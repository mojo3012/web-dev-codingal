<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Containers in Bootstrap</h1>
    <div class="container-sm p-3 mb-2 bg-info-subtle text-info-emphasis">Small container</div>
    <div class="container-md p-3 mb-2 bg-danger-subtle text-danger-emphasis">Medium container</div>
    <div class="container-lg p-3 mb-2 bg-warning-subtle text-warning-emphasis">Large container</div>
    <div class="container-xl p-3 mb-2 bg-primary-subtle text-primary-emphasis">XL container</div>
    <div class="container-xxl p-3 mb-2 bg-success-subtle text-success-emphasis">XXL container</div>
    <div class="container-fluid p-3 mb-2 bg-dark-subtle text-dark-emphasis">Fluid container</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
