<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intro to loops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Intro to loops</h1>
    <button type="button" class="btn btn-danger" onclick="showFruits()">Show fruits</button>
    <button type="button" class="btn btn-success" onclick="showFlowers()">Show flowers</button>
    <p id="output"></p>
    <script>

       
        function showFruits() {
            let fruits = ["mango", "pear", "apple", "watermelon", "papaya", "banana"]
            let output = ""
            for (let i = 0; i < fruits.length; i++) {
                output += fruits[i] + " "
            }
            document.getElementById("output").innerHTML = output
        }
        function showFlowers() {
            let flowers = ["sunflower", "daisy", "lily", "poppy", "rose"]
            let output = ""
            for (let i = 0; i < flowers.length; i++) {
                output += flowers[i] + " "
            }
            document.getElementById("output").innerHTML = output
        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
