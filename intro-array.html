<!DOCTYPE html>
<html>

<head>
    <title>Hungry Slime Array Game</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            background: #f0f8ff;
            padding-top: 50px;
        }

        #slime {
            font-size: 80px;
            margin: 20px;
            transition: transform 0.2s;
            display: inline-block;
        }

        #queue-display {
            font-size: 30px;
            margin: 20px;
            min-height: 40px;
            background: white;
            width: 300px;
            margin: 20px auto;
            border-radius: 10px;
            padding: 10px;
            border: 2px dashed #ccc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #4a90e2;
            color: rgb(243, 243, 243);
            margin: 5px;
        }

        button:hover {
            background: #357abd;
        }

        .status {
            color: #555;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Feeding Slime 👾</h1>
    <div id="slime">( •_• )</div>
    <p class="status" id="status">Status: Hungry!</p>

    <div id="queue-display"></div>

    <div>
        <button onclick="addFood()">Add Apple (Push)</button>
        <button onclick="feedSlime()">Feed Slime (Shift)</button>
        <button onclick="cookFood()">Cook Everything (Map)</button>
        <button onclick="cleanPlate()" style="background: #e74c3c;">Clear (Length = 0)</button>
    </div>

    <script>
        let foodQueue = [];
        const slime = document.getElementById('slime');
        const display = document.getElementById('queue-display');
        const status = document.getElementById('status');

        function updateUI() {
            display.innerText = foodQueue.length > 0 ? foodQueue.join(" ➔ ") : "[ Empty ]";
        }

        function addFood() {
            foodQueue.push("🍎");
            status.innerText = "Added 🍎 to the end!";
            updateUI();
        }

        function feedSlime() {
            if (foodQueue.length > 0) {
                const eaten = foodQueue.shift();
                slime.innerText = "( > 0 < )";
                slime.style.transform = "scale(1.3)";
                status.innerText = `Slime ate the ${eaten}!`;
                setTimeout(() => {
                    slime.innerText = "( •_• )";
                    slime.style.transform = "scale(1)";
                }, 400);
                updateUI();
            } else {
                status.innerText = "The queue is empty!";
            }
        }

        function cookFood() {
            if (foodQueue.length > 0) {
                foodQueue = foodQueue.map(item => item === "🍎" ? "🥧" : item);
                status.innerText = "All 🍎 became 🥧!";
                updateUI();
            }
        }

        function cleanPlate() {
            foodQueue = [];
            status.innerText = "Cleared the array!";
            updateUI();
        }

        updateUI();
    </script>
</body>

</html>
