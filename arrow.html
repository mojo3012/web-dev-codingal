<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow-Function</title>
</head>

<body>
    <h1>Arrow-Function</h1>
    <p id="output"></p>
    <script>
        const sum = (a, b) => a + b
        var a = 67
        var b = 2
        document.getElementById("output").innerHTML = sum(a, b)
    </script>
</body>

</html>
